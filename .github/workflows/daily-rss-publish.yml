name: Daily RSS Publish

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: daily-rss-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger RSS publishing on Railway
        env:
          API_URL: https://ai-automator-lab-production.up.railway.app
          SCHEDULE_TRIGGER_TOKEN: ${{ secrets.SCHEDULE_TRIGGER_TOKEN }}
        run: |
          if [ -z "$SCHEDULE_TRIGGER_TOKEN" ]; then
            echo "Missing required GitHub secret: SCHEDULE_TRIGGER_TOKEN"
            exit 1
          fi

          curl_args=(
            --fail-with-body
            --request POST
            --url "$API_URL/api/schedule/run"
            --header "Content-Type: application/json"
            --data '{"mode":"rss"}'
          )

          curl_args+=(--header "Authorization: Bearer $SCHEDULE_TRIGGER_TOKEN")

          curl "${curl_args[@]}"
